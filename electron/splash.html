<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema de Turnos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
      position: relative;
      -webkit-app-region: drag;
    }

    /* Imagen de fondo */
    .bg {
      position: fixed;
      inset: 0;
      background: url('../public/doctor-bg.jpg') center center / cover no-repeat;
      z-index: 0;
    }

    /* Capa oscura sobre la imagen */
    .bg-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(10, 20, 60, 0.82) 0%,
        rgba(15, 40, 100, 0.75) 50%,
        rgba(5, 30, 80, 0.85) 100%
      );
      z-index: 1;
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 10px;
      width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
      overflow: hidden;
      -webkit-app-region: no-drag;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }


    .card-body {
      padding: 38px 42px 34px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Título */
    .brand {
      width: 100%;
      margin-bottom: 28px;
      text-align: center;
    }


    .brand-text .name {
      font-size: 1.3rem;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .brand-text .sub {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      margin-top: 3px;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.12);
      margin-bottom: 22px;
    }

    /* Créditos */
    .credits {
      width: 100%;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .credits-by {
      font-size: 0.72rem;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
    }

    .credits-company {
      font-size: 0.82rem;
      font-weight: 800;
      color: #93c5fd;
    }

    .credits-sep {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.25);
    }

    .credits-author {
      font-size: 0.78rem;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
    }

    /* Botón */
    .btn {
      width: 100%;
      padding: 13px 0;
      background: #1d4ed8;
      color: #fff;
      font-size: 0.88rem;
      font-weight: 700;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.12s, transform 0.08s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover  { background: #1e40af; }
    .btn:active { transform: scale(0.985); background: #1e3a8a; }

    /* Fecha ingreso */
    .fecha-ingreso {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 0 2px;
    }

    .fecha-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.9px;
    }

    .fecha-valor {
      font-size: 0.82rem;
      font-weight: 700;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.2px;
    }

    /* Versión */
    .version {
      position: fixed;
      bottom: 14px;
      z-index: 10;
      font-size: 0.67rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="bg-overlay"></div>

  <div class="card">
    <div class="card-body">

      <div class="brand">
        <div class="brand-text">
          <div class="name">Sistema de Turnos</div>
          <div class="sub">Gestión de atención médica</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="credits">
        <span class="credits-by">Desarrollado por</span>
        <span class="credits-company">OpenKode</span>
        <span class="credits-sep">·</span>
        <span class="credits-author">Arturo Abril</span>
      </div>

      <div class="fecha-ingreso">
        <span class="fecha-label">Fecha de ingreso</span>
        <span class="fecha-valor" id="fechaHoy"></span>
      </div>

      <button class="btn" onclick="continuar()">Ingresar al sistema</button>

    </div>
  </div>

  <div class="version">v1.0.0 · OpenKode</div>

  <script>
    function continuar() {
      window.__electronContinuar && window.__electronContinuar();
    }

    const now = new Date();
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('fechaHoy').textContent =
      now.toLocaleDateString('es-MX', opts).replace(/^\w/, c => c.toUpperCase());
  </script>
</body>
</html>
